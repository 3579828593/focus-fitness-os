<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Focus Fitness OS - 备考×健身×规则编排">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FocusFitnessOS">
  <meta name="theme-color" content="#0D1117">
  <link rel="manifest" href="manifest.json">
  <title>专注健身OS</title>
  <style>
    body { background-color: #0D1117; margin: 0; }
    #loading {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 9999;
    }
    #loading .spinner {
      width: 40px; height: 40px; margin: 0 auto 16px;
      border: 3px solid rgba(212, 116, 74, 0.2);
      border-top-color: #D4744A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loading p {
      color: #8B949E;
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 14px;
      letter-spacing: 1px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading.fade-out {
      opacity: 0;
      transition: opacity 0.3s ease-out;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>加载专注健身OS...</p>
  </div>
  <script>
    var serviceWorkerVersion = null;
    var scriptLoaded = false;
    function loadMainDartJs() {
      if (scriptLoaded) return;
      scriptLoaded = true;
      var scriptTag = document.createElement('script');
      scriptTag.src = 'main.dart.js';
      scriptTag.type = 'application/javascript';
      document.body.append(scriptTag);
    }
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('flutter_service_worker.js');
      });
    }
    setTimeout(loadMainDartJs, 100);

    // === Loading 遮罩自动移除 ===
    // Flutter Web 初始化后会在 DOM 中插入 flt-glass-pane 元素，
    // 检测到该元素后淡出移除 loading 遮罩。
    var loadingEl = document.getElementById('loading');
    var removeLoading = function() {
      if (loadingEl && loadingEl.parentNode) {
        loadingEl.classList.add('fade-out');
        setTimeout(function() {
          if (loadingEl.parentNode) loadingEl.parentNode.removeChild(loadingEl);
        }, 300);
      }
    };
    // 方案1: MutationObserver 监听 Flutter 视图元素插入
    var observer = new MutationObserver(function(mutations) {
      for (var i = 0; i < mutations.length; i++) {
        var nodes = mutations[i].addedNodes;
        for (var j = 0; j < nodes.length; j++) {
          var n = nodes[j];
          if (n.nodeType === 1 && (
            n.tagName === 'FLT-GLASS-PANE' ||
            n.tagName === 'FLUTTER-VIEW' ||
            (n.querySelector && n.querySelector('flt-glass-pane'))
          )) {
            removeLoading();
            observer.disconnect();
            return;
          }
        }
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
    // 方案2: 超时兜底 (8 秒后强制移除)
    setTimeout(removeLoading, 8000);
  </script>
</body>
</html>
