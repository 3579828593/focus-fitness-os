<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Focus Fitness OS - 备考×健身×规则编排">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FocusFitnessOS">
  <meta name="theme-color" content="#6F8F72">
  <link rel="manifest" href="manifest.json">
  <title>专注健身OS</title>
  <style>
    body { background-color: #6F8F72; }
    #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    #loading .spinner { width: 40px; height: 40px; margin: 0 auto 16px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    #loading p { color: #fff; font-family: sans-serif; font-size: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>加载专注健身OS...</p>
  </div>
  <script>
    var serviceWorkerVersion = null;
    var scriptLoaded = false;
    function loadMainDartJs() {
      if (scriptLoaded) return;
      scriptLoaded = true;
      var scriptTag = document.createElement('script');
      scriptTag.src = 'main.dart.js';
      scriptTag.type = 'application/javascript';
      document.body.append(scriptTag);
    }
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('flutter_service_worker.js');
      });
    }
    setTimeout(loadMainDartJs, 100);
  </script>
</body>
</html>
