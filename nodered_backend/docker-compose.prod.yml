version: '3.8'

# ============================================
# 生产环境 Docker Compose 配置
# - 端口仅绑定 127.0.0.1
# - 资源限制
# - 健康检查
# - 依赖顺序控制
# ============================================

services:
  nodered:
    build:
      context: .
      dockerfile: Dockerfile
    image: focus-fitness-nodered:4.0.2
    container_name: focus_fitness_nodered_prod
    ports:
      - "127.0.0.1:1880:1880"
    volumes:
      - ./data:/data
      - ./flows:/flows
    environment:
      - FLOWS=/flows/flows.json
      - TZ=Asia/Shanghai
      - NODE_RED_SECRET=${NODE_RED_SECRET:-dev-secret-change-in-prod}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - PUSHOVER_TOKEN=${PUSHOVER_TOKEN:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:1880/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - focus_fitness_net

  wger:
    image: wger/server:2.3.0
    container_name: focus_fitness_wger_prod
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - focus_fitness_net

networks:
  focus_fitness_net:
    driver: bridge
    name: focus_fitness_net
