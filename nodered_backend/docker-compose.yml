version: '3.8'

services:
  nodered:
    image: nodered/node-red:latest
    container_name: focus_fitness_nodered
    ports:
      - "1880:1880"
    volumes:
      - ./data:/data
      - ./flows:/flows
    environment:
      - FLOWS=/flows/flows.json
      - TZ=Asia/Shanghai
    restart: unless-stopped
    networks:
      - focus_fitness_net

  wger:
    image: wger/server:latest
    container_name: focus_fitness_wger
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - focus_fitness_net

networks:
  focus_fitness_net:
    driver: bridge
    name: focus_fitness_net
