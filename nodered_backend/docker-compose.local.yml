version: '3.8'

# ============================================
# Focus Fitness OS - Local Docker + Cloudflare Tunnel
# Port bound to 127.0.0.1 only (Cloudflare Tunnel proxies public traffic)
# ============================================

services:
  nodered:
    build:
      context: .
      dockerfile: Dockerfile
    image: focus-fitness-nodered:local
    container_name: focus_fitness_local
    ports:
      - "127.0.0.1:1880:1880"
    volumes:
      - nodered_data:/data
    environment:
      - FLOWS=flows.json
      - TZ=Asia/Shanghai
      - NODE_RED_SECRET=${NODE_RED_SECRET:-dev-secret-change-in-prod}
      - JWT_SECRET=${JWT_SECRET:-focus-fitness-os-jwt-secret-2024}
      - PORT=1880
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:1880/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  nodered_data:
    driver: local
