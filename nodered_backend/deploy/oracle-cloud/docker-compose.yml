# ============================================
# Focus Fitness OS - Oracle Cloud Always Free
# Docker Compose for ARM (Ampere A1)
# 永久免费 | 2 OCPU | 12GB RAM | 200GB Storage
# ============================================
version: "3.8"

services:
  nodered:
    image: ghcr.io/3579828593/focus-fitness-os-backend:latest
    container_name: ffos-nodered
    restart: always
    ports:
      - "127.0.0.1:1880:1880"
    volumes:
      - nodered_data:/data
      - ./settings.oracle.js:/data/settings.js:ro
    environment:
      - FLOWS=flows.json
      - TZ=Asia/Shanghai
      - PORT=1880
      - JWT_SECRET=${JWT_SECRET}
      - NODE_RED_SECRET=${NODE_RED_SECRET}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:1880/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - ffos_net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"

  nginx:
    image: nginx:alpine
    container_name: ffos-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - nginx_cache:/var/cache/nginx
      - nginx_run:/var/run
    depends_on:
      nodered:
        condition: service_healthy
    networks:
      - ffos_net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  watchtower:
    image: containrrr/watchtower
    container_name: ffos-watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
      - WATCHTOWER_LABEL_ENABLE=true
    command: --label-enable
    networks:
      - ffos_net
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"

volumes:
  nodered_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/ffos/data
  nginx_cache:
  nginx_run:

networks:
  ffos_net:
    driver: bridge
