# Focus Fitness OS - Nginx 反向代理配置
# 提供 TLS 终端，将 HTTPS 流量代理到 Node-RED 后端
# 部署: 由 docker-compose.tls.yml 挂载到 /etc/nginx/nginx.conf

# 运行用户
user nginx;
# 工作进程数，auto 表示按 CPU 核心数自动分配
worker_processes auto;
# PID 文件路径
pid /var/run/nginx.pid;

# 错误日志
error_log /var/log/nginx/error.log warn;

events {
    # 单个工作进程的最大连接数
    worker_connections 1024;
}

http {
    # MIME 类型映射
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 基础优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Node-RED 后端上游
    upstream nodered_backend {
        server nodered:1880;
    }

    # HTTP 服务：重定向到 HTTPS
    server {
        listen 80;
        server_name _;
        # HTTP → HTTPS 重定向
        return 301 https://$host$request_uri;
    }

    # HTTPS 服务：TLS 终端
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS 证书（从环境变量指定路径或使用自签名证书）
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # TLS 安全配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # HSTS（强制浏览器使用 HTTPS）
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # 安全 headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # API 代理
        location /api/ {
            proxy_pass http://nodered_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
        }

        # Node-RED 编辑器（仅允许特定 IP 访问）
        location / {
            # 允许本地和内网访问
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://nodered_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # 健康检查端点（无需认证）
        location /health {
            proxy_pass http://nodered_backend;
            access_log off;
        }
    }
}
