version: '3.8'

# TLS 加密版 Docker Compose
# 使用 Nginx 反向代理提供 HTTPS 端点
# 启动: docker-compose -f docker-compose.tls.yml up -d

services:
  nodered:
    image: nodered/node-red:4.0.2
    container_name: focus_fitness_nodered_tls
    volumes:
      - ./data:/data
      - ./flows:/flows
    environment:
      - FLOWS=/flows/flows.json
      - TZ=Asia/Shanghai
    restart: unless-stopped
    networks:
      - tls_internal

  nginx:
    image: nginx:1.25.3-alpine
    container_name: focus_fitness_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - nodered
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "--no-check-certificate", "https://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - tls_internal
      - focus_fitness_net

networks:
  tls_internal:
    driver: bridge
  focus_fitness_net:
    external: true
    name: focus_fitness_net
